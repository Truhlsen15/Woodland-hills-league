*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#f5f7f5;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
input,select,button{font-family:inherit;outline:none}
.card{background:#fff;border:1px solid #d4e0d4;border-radius:12px;box-shadow:0 1px 4px rgba(0,0,0,0.06)}
.btn{background:#1e5c1e;color:#fff;border:none;border-radius:8px;padding:13px 24px;font-size:16px;font-weight:700;cursor:pointer;width:100%}
.btn:hover{background:#267326}
.btn:disabled{opacity:.4;cursor:default}
.btns{background:#1e5c1e;color:#fff;border:none;border-radius:7px;padding:9px 18px;font-size:13px;font-weight:600;cursor:pointer}
.btng{background:#fff;color:#1a3a5c;border:1px solid #d4e0d4;border-radius:7px;padding:9px 18px;font-size:13px;cursor:pointer}
.btnp{background:#fff;color:#8a4ab0;border:1px solid #7a4a9a55;border-radius:7px;padding:9px 18px;font-size:13px;cursor:pointer}
.tab{background:none;border:none;border-bottom:3px solid transparent;cursor:pointer;padding:11px 16px;font-size:13px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;color:#4a6a4a;transition:color .2s}
.tab.on{color:#1e5c1e;border-bottom-color:#1e5c1e}
.ovl{position:fixed;inset:0;background:#0005;display:flex;align-items:center;justify-content:center;z-index:999;padding:20px}
tr.h:hover td{background:#f8fbf8!important}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:#eee}::-webkit-scrollbar-thumb{background:#aaa;border-radius:2px}

// Build weeks starting Apr 8 2026 (current Wednesday)
const WEEKS=[];
// Use local date constructor (not string) to avoid UTC timezone shift
const WK_START=new Date(2026,3,8); // April 8 2026 in local time
for(let i=0;i<26;i++){
  const d=new Date(2026,3,8+i*7);
  WEEKS.push({label:d.toLocaleDateString("en-US",{month:"long",day:"numeric",year:"numeric"}),tigerFront:i%2===0});
}
WEEKS.push({label:"Test Week",tigerFront:true});

function curWeekIdx(){
  const now=new Date();
  // Use local date parts to avoid timezone issues
  const y=now.getFullYear(), m=now.getMonth(), d=now.getDate();
  const today=new Date(y,m,d);
  const day=today.getDay(); // 0=Sun,3=Wed
  const back=(day>=3)?(day-3):(day+4);
  const wed=new Date(y,m,d-back);
  for(let i=0;i<WEEKS.length-1;i++){
    const wDate=new Date(WEEKS[i].label);
    const wy=wDate.getFullYear(),wm=wDate.getMonth(),wd=wDate.getDate();
    if(wy===wed.getFullYear()&&wm===wed.getMonth()&&wd===wed.getDate()) return i;
  }
  return 0;
}

function getHoles(group,wk){
  const w=WEEKS.find(x=>x.label===wk);
  if(!w) return F9;
  return (group===GROUPS[0]?w.tigerFront:!w.tigerFront)?F9:B9;
}

function toPar(scores,holes){
  const pl=holes.filter(i=>scores[i]>0);
  if(!pl.length) return null;
  return pl.reduce((a,i)=>a+scores[i],0)-pl.reduce((a,i)=>a+PARS[i],0);
}
function tpStr(v){if(v===null)return"–";if(v===0)return"E";return v>0?`+${v}`:String(v);}
function tpCol(v){if(v===null)return"#7a9a7a";if(v<0)return"#1a7a3a";if(v===0)return"#b8860b";return"#c0392b";}

function holeColor(s,par){
  if(!s)return"#fff";
  const d=s-par;
  if(d<=-2)return"#ffd700";
  if(d===-1)return"#2e7d32";
  if(d===0)return"#1565c0";
  if(d===1)return"#bf360c";
  return"#7b1fa2";
}

function skinsCalc(wd,holes){
  const pks=Object.keys(wd); let co=0;
  const pts={},sh={},hw={};
  pks.forEach(p=>{pts[p]=0;sh[p]=[];});
  for(const hi of holes){
    const vs=pks.map(p=>(wd[p].scores||[])[hi]||0).filter(s=>s>0);
    if(vs.length<2){co++;hw[hi]=null;continue;}
    const mn=Math.min(...vs),wins=pks.filter(p=>(wd[p].scores||[])[hi]===mn);
    if(wins.length===1){pts[wins[0]]+=1+co;sh[wins[0]].push(hi+1);hw[hi]=wins[0];co=0;}
    else{co++;hw[hi]=null;}
  }
  return{pts,sh,co,hw};
}

function doExport(weekLabel,allWD){
  const wb=XLSX.utils.book_new();
  const td=Object.fromEntries(Object.entries(allWD).filter(([,v])=>v.group===GROUPS[0]));
  const jd=Object.fromEntries(Object.entries(allWD).filter(([,v])=>v.group===GROUPS[1]));
  const wo=WEEKS.find(w=>w.label===weekLabel);
  const th=wo?(wo.tigerFront?F9:B9):F9;
  const jh=wo?(!wo.tigerFront?F9:B9):B9;

  function sc(wd,holes,gn){
    const nine=holes===F9?"Front 9":"Back 9";
    const hn=holes.map(i=>i+1),p9=holes.reduce((a,i)=>a+PARS[i],0);
    const{pts,sh,hw}=skinsCalc(wd,holes);
    const sorted=Object.entries(wd).sort(([,a],[,b])=>{
      const ta=toPar(a.scores||[],holes),tb=toPar(b.scores||[],holes);
      if(ta===null&&tb===null)return 0;if(ta===null)return 1;if(tb===null)return-1;return ta-tb;
    });
    const aoa=[[`Woodland Hills - ${weekLabel} - ${gn} (${nine}) Par ${p9}`,...Array(hn.length+1).fill("")],
      ["Yellow bold = skin won","",""],[]
      ,["Player",...hn,"Total","To Par"],["Par",...holes.map(i=>PARS[i]),p9,""],["HCP",...holes.map(i=>HCPS[i]),"",""],[]];
    sorted.forEach(([,p])=>{
      const s=p.scores||Array(18).fill(0);
      const tot=holes.reduce((a,i)=>a+(s[i]||0),0);
      aoa.push([p.name,...holes.map(i=>s[i]||""),tot||"",tpStr(toPar(s,holes))]);
    });
    aoa.push([],["SKINS SUMMARY"],["Player","Skins Won","Holes Won"]);
    Object.entries(wd).sort(([,a],[,b])=>(pts[`${b.name}__${b.group}`]||0)-(pts[`${a.name}__${a.group}`]||0))
      .forEach(([k,p])=>aoa.push([p.name,pts[k]||"–",sh[k]?.length?sh[k].join(", "):"–"]));
    const ws=XLSX.utils.aoa_to_sheet(aoa);
    const pr=8;
    sorted.forEach(([,p],ri)=>{
      const pk=`${p.name}__${p.group}`,s=p.scores||[];
      holes.forEach((hi,si)=>{
        if(hw[hi]===pk){
          const addr=XLSX.utils.encode_cell({r:pr-1+ri,c:1+si});
          if(!ws[addr])ws[addr]={t:"n",v:s[hi]};
          ws[addr].s={font:{bold:true},fill:{patternType:"solid",fgColor:{rgb:"FFFF00"}}};
        }
      });
    });
    ws["!cols"]=[{wch:20},...hn.map(()=>({wch:6})),{wch:7},{wch:8}];
    return ws;
  }

  function sk(wd,holes,gn){
    const nine=holes===F9?"Front 9":"Back 9";
    const{pts,sh,co}=skinsCalc(wd,holes);
    const aoa=[[`SKINS - ${weekLabel} - ${gn} - ${nine}`,"","",""],
      ["Clubhouse calculates payouts","","",""],[]
      ,["Player","Skins Won","Holes Won",""]];
    Object.entries(wd).sort(([,a],[,b])=>(pts[`${b.name}__${b.group}`]||0)-(pts[`${a.name}__${a.group}`]||0))
      .forEach(([k,p])=>aoa.push([p.name,pts[k]||"–",sh[k]?.length?sh[k].join(", "):"–",""]));
    if(co>0)aoa.push([],[`${co} skin(s) carry to next week`]);
    aoa.push([],["HOLE-BY-HOLE"],["Hole","Par","Winner","Score","Pot"]);
    let hco=0;
    for(const hi of holes){
      const hps=Object.entries(wd).map(([k,p])=>({name:p.name,score:(p.scores||[])[hi]||0,key:k})).filter(x=>x.score>0);
      if(hps.length<2){hco++;aoa.push([hi+1,PARS[hi],"–","",""]);continue;}
      const mn=Math.min(...hps.map(x=>x.score)),wins=hps.filter(x=>x.score===mn);
      if(wins.length===1){aoa.push([hi+1,PARS[hi],wins[0].name,mn,`${1+hco} skin${1+hco>1?"s":""}${hco>0?` (incl ${hco} carry)`:""}`]);hco=0;}
      else{hco++;aoa.push([hi+1,PARS[hi],`Tie - ${wins.map(x=>x.name).join(" & ")}`,mn,"Carryover"]);}
    }
    const ws=XLSX.utils.aoa_to_sheet(aoa);
    ws["!cols"]=[{wch:6},{wch:5},{wch:36},{wch:7},{wch:20}];
    return ws;
  }

  function tot(){
    const aoa=[[`WEEKLY TOTALS - ${weekLabel} - Woodland Hills`,"","","",""],[]];
    for(const[gn,wd,holes] of[[GROUPS[0],td,th],[GROUPS[1],jd,jh]]){
      const nine=holes===F9?"Front 9":"Back 9";
      const{pts}=skinsCalc(wd,holes);
      aoa.push([`${gn} - ${nine}`,"","","",""]);
      aoa.push(["Pos","Player","Score","To Par","Thru","Skins"]);
      Object.values(wd).sort((a,b)=>{
        const ta=toPar(a.scores||[],holes),tb=toPar(b.scores||[],holes);
        if(ta===null&&tb===null)return 0;if(ta===null)return 1;if(tb===null)return-1;return ta-tb;
      }).forEach((p,i)=>{
        const pk=`${p.name}__${p.group}`,s=p.scores||[];
        const tot=holes.reduce((a,h)=>a+(s[h]||0),0);
        const thru=holes.filter(h=>s[h]>0).length;
        aoa.push([i+1,p.name,tot||"–",tpStr(toPar(s,holes)),thru===holes.length?"F":`${thru}/${holes.length}`,pts[pk]||"–"]);
      });
      aoa.push([]);
    }
    const ws=XLSX.utils.aoa_to_sheet(aoa);
    ws["!cols"]=[{wch:5},{wch:22},{wch:8},{wch:9},{wch:7},{wch:7}];
    return ws;
  }

  XLSX.utils.book_append_sheet(wb,sc(td,th,GROUPS[0]),"Tiger Woods");
  XLSX.utils.book_append_sheet(wb,sc(jd,jh,GROUPS[1]),"Jack Nicklaus");
  XLSX.utils.book_append_sheet(wb,sk(td,th,GROUPS[0]),"Skins - Tiger Woods");
  XLSX.utils.book_append_sheet(wb,sk(jd,jh,GROUPS[1]),"Skins - Jack Nicklaus");
  XLSX.utils.book_append_sheet(wb,tot(),"Weekly Totals");
  XLSX.writeFile(wb,`WoodlandHills_${weekLabel.replace(/[^a-z0-9]/gi,"_")}.xlsx`);
}

function wkKey(lbl){return"weeks/"+lbl.replace(/[^a-zA-Z0-9]/g,"_");}

function AdminModal({show,onClose,onSuccess,action}){
  const[pw,setPw]=useState(""); const[err,setErr]=useState("");
  if(!show)return null;
  function sub(){if(pw===ADMIN_PW){setErr("");onSuccess();}else setErr("Incorrect admin password.");}
  return(
    <div className="ovl" onClick={onClose}>
      <div className="card" style={{padding:28,width:"100%",maxWidth:340}} onClick={e=>e.stopPropagation()}>
        <div style={{fontSize:17,color:"#8a4ab0",fontWeight:700,marginBottom:6}}>Admin Required</div>
        <div style={{fontSize:13,color:"#4a6a4a",marginBottom:14}}>{action==="export"?"Export requires admin.":"Editing requires admin."}</div>
        <input type="password" value={pw} onChange={e=>{setPw(e.target.value);setErr("");}}
          onKeyDown={e=>e.key==="Enter"&&sub()} placeholder="Admin password..."
          style={{width:"100%",background:"#fff",border:`1px solid ${err?"#c0392b":"#d4e0d4"}`,borderRadius:8,padding:"12px 14px",fontSize:15,marginBottom:err?6:14}}/>
        {err&&<div style={{color:"#c0392b",fontSize:12,marginBottom:10}}>{err}</div>}
        <div style={{display:"flex",gap:10}}>
          <button className="btns" onClick={sub} style={{flex:1,padding:12}}>Confirm</button>
          <button className="btng" onClick={onClose} style={{flex:1,padding:12}}>Cancel</button>
        </div>
      </div>
    </div>
  );
}

  const[screen,setScreen]=useState("login");
  const[pwIn,setPwIn]=useState(""); const[pwErr,setPwErr]=useState("");
  const[isAdmin,setIsAdmin]=useState(false);
  const cwi=curWeekIdx();
  const[first,setFirst]=useState(""); const[last,setLast]=useState("");
  const[group,setGroup]=useState(GROUPS[0]);
  const[week,setWeek]=useState(WEEKS[cwi].label);
  const[tab,setTab]=useState("scorecard");
  const[wkData,setWkData]=useState({});
  const[loaded,setLoaded]=useState(false);
  const[saved,setSaved]=useState("");
  const[user,setUser]=useState(null);
  const[submitted,setSubmitted]=useState(false);
  const[modal,setModal]=useState(false);
  const[mAction,setMAction]=useState(null);
  const lRef=useRef(null);

  function subscribe(wkLabel){
    if(lRef.current)lRef.current();
    const ref=FB.ref(wkKey(wkLabel));
    const h=ref.on("value",snap=>{setWkData(snap.val()||{});setLoaded(true);});
    lRef.current=()=>ref.off("value",h);
  }

  useEffect(()=>{subscribe(WEEKS[cwi].label);return()=>{if(lRef.current)lRef.current();};},[]);

  function save(wkLabel,pk,pd){
    FB.ref(`${wkKey(wkLabel)}/${pk}`).set(pd);
    setSaved("Saved"); setTimeout(()=>setSaved(""),1500);
  }

  function login(){
    if(pwIn===ADMIN_PW){setIsAdmin(true);setScreen("register");setPwErr("");}
    else if(pwIn===PW){setIsAdmin(false);setScreen("register");setPwErr("");}
    else setPwErr("Incorrect password.");
  }

  function enter(){
    const f=first.trim(),l=last.trim();
    if(!f||!l)return;
    const name=`${f} ${l}`,pk=`${name}__${group}`;
    subscribe(week);
    FB.ref(`${wkKey(week)}/${pk}`).once("value").then(snap=>{
      const ex=snap.val();
      if(!ex){
        const pd={name,group,scores:Array(18).fill(0),submitted:false};
        FB.ref(`${wkKey(week)}/${pk}`).set(pd);
        setSubmitted(false);
      } else {
        setSubmitted(ex.submitted||false);
      }
      setUser({name,group,week,pk});
      setScreen("app");
    });
  }

  function setScore(hi,val){
    if(submitted&&!isAdmin)return;
    const n=Math.max(0,Math.min(15,parseInt(val)||0));
    const sc=[...(wkData[user.pk]?.scores||Array(18).fill(0))];
    sc[hi]=n;
    save(user.week,user.pk,{...wkData[user.pk],scores:sc});
  }

  function submitRound(){
    save(user.week,user.pk,{...wkData[user.pk],submitted:true});
    setSubmitted(true);
  }

  function requireAdmin(action){
    if(isAdmin){if(action==="export")doExport(user.week,wkData);return;}
    setMAction(action);setModal(true);
  }

  if(!loaded)return<div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",background:"#f5f7f5",color:"#1e5c1e",fontSize:18}}>Loading...</div>;

  const si={width:"100%",background:"#fff",border:"1px solid #d4e0d4",borderRadius:8,padding:"12px 14px",color:"#1a2a1a",fontSize:15};

  // LOGIN
  if(screen==="login")return(
    <div style={{minHeight:"100vh",background:"#f5f7f5",display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
      <div style={{width:"100%",maxWidth:380}}>
        <div style={{textAlign:"center",marginBottom:28}}>
          <img src={LOGO} alt="Woodland Hills" style={{maxWidth:220,width:"100%"}}/>
          <div style={{marginTop:10,fontSize:13,color:"#4a6a4a",letterSpacing:2,textTransform:"uppercase"}}>Men's Golf League · 2026</div>
          <div style={{width:50,height:3,background:"#1e5c1e",margin:"10px auto 0",borderRadius:2}}/>
        </div>
        <div className="card" style={{padding:28}}>
          <div style={{fontSize:13,color:"#4a6a4a",letterSpacing:1,textTransform:"uppercase",textAlign:"center",marginBottom:14,fontWeight:600}}>League Password</div>
          <input type="password" value={pwIn} onChange={e=>setPwIn(e.target.value)} onKeyDown={e=>e.key==="Enter"&&login()}
            placeholder="Enter password..."
            style={{...si,marginBottom:pwErr?8:16,borderColor:pwErr?"#c0392b":"#d4e0d4"}}/>
          {pwErr&&<div style={{color:"#c0392b",fontSize:13,marginBottom:12}}>{pwErr}</div>}
          <button className="btn" onClick={login}>Enter League</button>
        </div>
        <div style={{textAlign:"center",marginTop:14,fontSize:11,color:"#7a9a7a"}}>620 NE 66th Ave · Des Moines, IA · (515) 289-1326</div>
      </div>
    </div>
  );

  // REGISTER
  if(screen==="register")return(
    <div style={{minHeight:"100vh",background:"#f5f7f5",display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
      <div style={{width:"100%",maxWidth:420}}>
        <div style={{textAlign:"center",marginBottom:22}}>
          <img src={LOGO} alt="Woodland Hills" style={{maxWidth:200,width:"100%"}}/>
          {isAdmin&&<div style={{marginTop:8,color:"#8a4ab0",fontSize:12,fontWeight:600}}>Admin Mode</div>}
        </div>
        <div className="card" style={{padding:28}}>
          <div style={{fontSize:18,color:"#1e5c1e",fontWeight:700,textAlign:"center",marginBottom:20}}>Who's Playing Today?</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:14}}>
            {[["First",first,setFirst],["Last",last,setLast]].map(([lbl,val,set])=>(
              <div key={lbl}>
                <div style={{fontSize:11,color:"#4a6a4a",letterSpacing:1,textTransform:"uppercase",marginBottom:5,fontWeight:600}}>{lbl} Name</div>
                <input value={val} onChange={e=>set(e.target.value)} onKeyDown={e=>e.key==="Enter"&&enter()} placeholder={lbl} style={si}/>
              </div>
            ))}
          </div>
          <div style={{marginBottom:14}}>
            <div style={{fontSize:11,color:"#4a6a4a",letterSpacing:1,textTransform:"uppercase",marginBottom:5,fontWeight:600}}>Group</div>
            <select value={group} onChange={e=>setGroup(e.target.value)} style={si}>
              {GROUPS.map(g=><option key={g} value={g}>{g}</option>)}
            </select>
          </div>
          <div style={{marginBottom:24}}>
            <div style={{fontSize:11,color:"#4a6a4a",letterSpacing:1,textTransform:"uppercase",marginBottom:5,fontWeight:600}}>Week</div>
            {isAdmin?(
              <select value={week} onChange={e=>setWeek(e.target.value)} style={si}>
                {WEEKS.map((w,i)=>(
                  <option key={w.label} value={w.label}>{i===cwi?`${w.label} - Current Week`:w.label}</option>
                ))}
              </select>
            ):(
              <select value={week} onChange={e=>setWeek(e.target.value)} style={{...si,background:"#f8fbf8",color:"#1e5c1e",fontWeight:700}}>
                <option value={WEEKS[cwi].label}>{WEEKS[cwi].label} - Current Week</option>
                {new Date()<new Date("2026-04-15")&&<option value="Test Week">Test Week</option>}
              </select>
            )}
          </div>
          <button className="btn" onClick={enter} disabled={!first.trim()||!last.trim()}>Start Round</button>
        </div>
      </div>
    </div>
  );

  // APP
  const my=wkData[user.pk]||{scores:Array(18).fill(0),submitted:false};
  const holes=getHoles(user.group,user.week);
  const nine=holes===F9?"Front 9":"Back 9";
  const myTot=holes.reduce((a,i)=>a+(my.scores[i]||0),0);
  const myTP=toPar(my.scores||[],holes);
  const allFilled=holes.every(i=>(my.scores[i]||0)>0);
  const gEntries=Object.entries(wkData).filter(([,v])=>v.group===user.group);
  const tabs=isAdmin
    ?[["scorecard","Scorecard"],["leaderboard","Leaderboard"],["options","Admin"]]
    :[["scorecard","Scorecard"],["leaderboard","Leaderboard"]];

  return(
    <div style={{minHeight:"100vh",background:"#f5f7f5",color:"#1a2a1a"}}>
      <AdminModal show={modal} onClose={()=>setModal(false)} action={mAction}
        onSuccess={()=>{setIsAdmin(true);setModal(false);if(mAction==="export")doExport(user.week,wkData);}}/>

      <div style={{background:"#fff",borderBottom:"1px solid #d4e0d4",boxShadow:"0 1px 4px rgba(0,0,0,0.06)"}}>
        <div style={{maxWidth:600,margin:"0 auto",padding:"12px 16px 0"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10,flexWrap:"wrap",gap:8}}>
            <img src={LOGO} alt="Woodland Hills" style={{height:40}}/>
            <div style={{textAlign:"right"}}>
              <div style={{display:"flex",alignItems:"center",gap:6,justifyContent:"flex-end"}}>
                <span style={{fontSize:14,color:"#1a2a1a",fontWeight:700}}>{user.name}</span>
                {isAdmin&&<span style={{background:"#f0e8ff",border:"1px solid #7a4a9a44",borderRadius:20,padding:"1px 8px",fontSize:10,color:"#8a4ab0",fontWeight:600}}>Admin</span>}
              </div>
              <div style={{fontSize:11,color:"#4a6a4a"}}>{user.group} · {nine}</div>
              {saved&&<div style={{fontSize:10,color:"#1e5c1e",fontWeight:600}}>{saved}</div>}
            </div>
          </div>
          <div style={{display:"flex",borderTop:"1px solid #d4e0d4",marginTop:4}}>
            {tabs.map(([t,l])=>(
              <button key={t} className={`tab${tab===t?" on":""}`} onClick={()=>setTab(t)}>{l}</button>
            ))}
          </div>
        </div>
      </div>

      <div style={{maxWidth:600,margin:"0 auto",padding:"20px 14px"}}>

        {tab==="scorecard"&&(
          <div>
            {submitted?(
              <div className="card" style={{padding:32,textAlign:"center"}}>
                <div style={{fontSize:44,marginBottom:12}}>✅</div>
                <div style={{fontSize:22,fontWeight:700,color:"#1e5c1e",marginBottom:6}}>Round Submitted!</div>
                <div style={{fontSize:15,color:"#4a6a4a",marginBottom:24}}>Your scores have been saved.</div>
                <div style={{display:"flex",justifyContent:"center",gap:40,marginBottom:24}}>
                  <div>
                    <div style={{fontSize:11,color:"#7a9a7a",textTransform:"uppercase",letterSpacing:1,marginBottom:4}}>Total</div>
                    <div style={{fontSize:42,fontWeight:700,color:"#1a3a5c"}}>{myTot}</div>
                  </div>
                  <div>
                    <div style={{fontSize:11,color:"#7a9a7a",textTransform:"uppercase",letterSpacing:1,marginBottom:4}}>To Par</div>
                    <div style={{fontSize:42,fontWeight:700,color:tpCol(myTP)}}>{tpStr(myTP)}</div>
                  </div>
                </div>
                <div style={{display:"flex",gap:10,justifyContent:"center",flexWrap:"wrap"}}>
                  <button className="btn" style={{width:"auto",padding:"11px 22px",fontSize:15}} onClick={()=>{
                    setFirst(""); setLast(""); setSubmitted(false); setUser(null); setScreen("register");
                  }}>Enter Another Player</button>
                  {isAdmin&&<button className="btng" style={{padding:"11px 22px"}} onClick={()=>{
                    save(user.week,user.pk,{...my,submitted:false});setSubmitted(false);
                  }}>Edit My Scores</button>}
                </div>
              </div>
            ):(
              <div>
                <div style={{textAlign:"center",marginBottom:16,color:"#4a6a4a",fontSize:13,fontWeight:600}}>
                  {nine} · Par {holes.reduce((a,i)=>a+PARS[i],0)} · {user.group}
                </div>
                <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:20}}>
                  {holes.map(hi=>{
                    const sc=(my.scores||[])[hi]||0,par=PARS[hi];
                    const bg=holeColor(sc,par);
                    const diff=sc?sc-par:null;
                    let lbl="";
                    if(diff!==null){if(diff<=-2)lbl="Eagle";else if(diff===-1)lbl="Birdie";else if(diff===0)lbl="Par";else if(diff===1)lbl="Bogey";else if(diff===2)lbl="Double";else lbl=`+${diff}`;}
                    return(
                      <div key={hi} className="card" style={{padding:"12px 16px",display:"flex",alignItems:"center",gap:14,background:sc?bg:"#fff",border:`1px solid ${sc?bg:"#d4e0d4"}`}}>
                        <div style={{minWidth:52,textAlign:"center"}}>
                          <div style={{fontSize:10,color:sc?"rgba(255,255,255,0.75)":"#7a9a7a",textTransform:"uppercase",letterSpacing:1,fontWeight:600}}>Hole</div>
                          <div style={{fontSize:30,fontWeight:800,color:sc?"#fff":"#1a3a5c",lineHeight:1.1}}>{hi+1}</div>
                        </div>
                        <div style={{minWidth:36,textAlign:"center"}}>
                          <div style={{fontSize:10,color:sc?"rgba(255,255,255,0.75)":"#7a9a7a",textTransform:"uppercase",letterSpacing:1,fontWeight:600}}>Par</div>
                          <div style={{fontSize:20,fontWeight:700,color:sc?"rgba(255,255,255,0.85)":"#4a6a4a"}}>{par}</div>
                        </div>
                        <div style={{width:1,height:38,background:sc?"rgba(255,255,255,0.25)":"#d4e0d4"}}/>
                        <div style={{flex:1,textAlign:"center"}}>
                          <div style={{fontSize:10,color:sc?"rgba(255,255,255,0.75)":"#7a9a7a",textTransform:"uppercase",letterSpacing:1,marginBottom:4,fontWeight:600}}>Score</div>
                          <input type="tel" maxLength={2} id={`h${hi}`}
                            defaultValue={sc||""}
                            key={`h${hi}-init`}
                            onInput={e=>{
                              const v=e.target.value.replace(/[^0-9]/g,"");
                              e.target.value=v;
                              if(v===""||v==="0")return;
                              const n=Math.min(15,parseInt(v)||0);
                              setScore(hi,String(n));
                              const advance=()=>{
                                const nhi=holes[holes.indexOf(hi)+1];
                                if(nhi!==undefined){
                                  const nx=document.getElementById("h"+nhi);
                                  if(nx){nx.focus();nx.select();nx.scrollIntoView({behavior:"smooth",block:"center"});}
                                }
                              };
                              if(e.target._t)clearTimeout(e.target._t);
                              if(v.length>=2){
                                advance();
                              } else {
                                e.target._t=setTimeout(advance,2000);
                              }
                            }}
                            onBlur={e=>{
                              if(e.target._t)clearTimeout(e.target._t);
                              const v=e.target.value.replace(/[^0-9]/g,"");
                              if(v===""||v==="0")return;
                              setScore(hi,String(Math.min(15,parseInt(v)||0)));
                            }}
                            onFocus={e=>{if(e.target._t)clearTimeout(e.target._t);e.target.select();}} placeholder="-"
                            style={{width:68,height:48,textAlign:"center",fontSize:26,fontWeight:800,
                              background:sc?"rgba(255,255,255,0.15)":"#f8faf8",
                              border:`2px solid ${sc?"rgba(255,255,255,0.4)":"#d4e0d4"}`,
                              borderRadius:10,color:sc?"#fff":"#1a3a5c",fontFamily:"inherit"}}/>
                        </div>
                        <div style={{minWidth:58,textAlign:"right"}}>
                          {lbl&&<span style={{fontSize:12,fontWeight:700,color:sc?"rgba(255,255,255,0.95)":"#4a6a4a",background:sc?"rgba(255,255,255,0.2)":"#f0f4f0",borderRadius:6,padding:"3px 8px"}}>{lbl}</span>}
                        </div>
                      </div>
                    );
                  })}
                </div>
                <div className="card" style={{padding:"14px 20px",marginBottom:16,display:"flex",justifyContent:"space-around"}}>
                  {[["Total",myTot||"–","#1a3a5c"],["To Par",tpStr(myTP),tpCol(myTP)],["Holes",`${holes.filter(i=>(my.scores||[])[i]>0).length}/${holes.length}`,"#4a6a4a"]].map(([l,v,cl])=>(
                    <div key={l} style={{textAlign:"center"}}>
                      <div style={{fontSize:10,color:"#7a9a7a",textTransform:"uppercase",letterSpacing:1,marginBottom:2,fontWeight:600}}>{l}</div>
                      <div style={{fontSize:32,fontWeight:800,color:cl}}>{v}</div>
                    </div>
                  ))}
                </div>
                {allFilled
                  ?<button className="btn" onClick={submitRound} style={{fontSize:18,padding:16}}>Submit Round</button>
                  :<div style={{textAlign:"center",fontSize:12,color:"#7a9a7a",padding:"10px 0"}}>Fill in all {holes.length} holes to submit</div>
                }
                <div style={{display:"flex",gap:8,flexWrap:"wrap",justifyContent:"center",marginTop:14}}>
                  {[["#ffd700","Eagle+"],["#2e7d32","Birdie"],["#1565c0","Par"],["#bf360c","Bogey"],["#7b1fa2","Double+"]].map(([bg,lbl])=>(
                    <div key={lbl} style={{display:"flex",alignItems:"center",gap:4}}>
                      <div style={{width:12,height:12,borderRadius:3,background:bg}}/><span style={{fontSize:11,color:"#7a9a7a"}}>{lbl}</span>
                    </div>
                  ))}
                </div>
              </div>
            )}
          </div>
        )}

        {tab==="leaderboard"&&(
          <div className="card" style={{overflow:"hidden"}}>
            <div style={{padding:"13px 16px",borderBottom:"1px solid #d4e0d4",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <span style={{color:"#1e5c1e",fontWeight:700,fontSize:16}}>Leaderboard - {user.group}</span>
              <span style={{fontSize:12,color:"#4a6a4a"}}>{nine} · {user.week}</span>
            </div>
            {gEntries.length===0
              ?<div style={{padding:36,textAlign:"center",color:"#7a9a7a",fontSize:14}}>No scores submitted yet.</div>
              :<table style={{width:"100%",borderCollapse:"collapse"}}>
                <thead>
                  <tr style={{background:"#f8fbf8"}}>
                    {["","Player","Score","To Par","Thru"].map(h=>(
                      <th key={h} style={{padding:"9px 12px",fontSize:10,color:"#4a6a4a",letterSpacing:1,textTransform:"uppercase",fontWeight:700,textAlign:h==="Player"?"left":"center"}}>{h}</th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {[...gEntries].sort(([,a],[,b])=>{
                    const ta=toPar(a.scores||[],holes),tb=toPar(b.scores||[],holes);
                    if(ta===null&&tb===null)return 0;if(ta===null)return 1;if(tb===null)return-1;return ta-tb;
                  }).map(([,p],idx)=>{
                    const tp=toPar(p.scores||[],holes);
                    const tot=holes.reduce((a,i)=>a+((p.scores||[])[i]||0),0);
                    const thru=holes.filter(i=>(p.scores||[])[i]>0).length;
                    return(
                      <tr key={p.name} className="h" style={{background:idx%2===0?"#fff":"#fafcfa",borderTop:"1px solid #d4e0d4"}}>
                        <td style={{textAlign:"center",padding:"12px 10px",fontSize:20}}>{idx===0?"🥇":idx===1?"🥈":idx===2?"🥉":idx+1}</td>
                        <td style={{padding:"12px 12px",fontWeight:600,fontSize:15}}>
                          {p.name}{p.name===user.name&&<span style={{color:"#1e5c1e",fontSize:10}}> ★</span>}
                          {p.submitted&&<span style={{fontSize:10,color:"#1e5c1e",marginLeft:4}}>✓</span>}
                        </td>
                        <td style={{textAlign:"center",fontWeight:700,fontSize:18,color:tp===null?"#7a9a7a":"#1a3a5c"}}>{tot||"–"}</td>
                        <td style={{textAlign:"center",fontWeight:700,fontSize:18,color:tpCol(tp)}}>{tpStr(tp)}</td>
                        <td style={{textAlign:"center",fontSize:13,color:"#4a6a4a"}}>{thru===0?"–":thru===holes.length?"F":`${thru}/${holes.length}`}</td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            }
          </div>
        )}

        {tab==="options"&&isAdmin&&(
          <div>
            <div className="card" style={{padding:22,marginBottom:14}}>
              <div style={{color:"#1e5c1e",fontWeight:700,fontSize:16,marginBottom:4}}>Export Weekly Excel</div>
              <div style={{fontSize:13,color:"#4a6a4a",marginBottom:14}}>5-tab Excel for the clubhouse.</div>
              {Object.keys(wkData).length===0
                ?<div style={{fontSize:12,color:"#7a9a7a"}}>No scores yet.</div>
                :<button className="btns" onClick={()=>requireAdmin("export")} style={{fontSize:14}}>Download Excel</button>
              }
            </div>
            <div className="card" style={{padding:22}}>
              <div style={{color:"#8a4ab0",fontWeight:700,fontSize:16,marginBottom:4}}>Unlock Player Scores</div>
              <div style={{fontSize:13,color:"#4a6a4a",marginBottom:14}}>Unsubmit a round so a player can re-enter.</div>
              <div style={{display:"flex",flexDirection:"column",gap:10}}>
                {gEntries.map(([pk,p])=>(
                  <div key={pk} style={{display:"flex",alignItems:"center",justifyContent:"space-between",background:"#f8fbf8",borderRadius:8,padding:"10px 14px",border:"1px solid #d4e0d4"}}>
                    <div>
                      <span style={{fontSize:14,fontWeight:600}}>{p.name}</span>
                      {p.submitted
                        ?<span style={{fontSize:11,color:"#1e5c1e",marginLeft:8,fontWeight:600}}>✓ Submitted</span>
                        :<span style={{fontSize:11,color:"#4a6a4a",marginLeft:8}}>In progress</span>}
                    </div>
                    {p.submitted&&(
                      <button className="btnp" style={{fontSize:11,padding:"6px 12px"}} onClick={()=>{
                        const pd={...p,submitted:false};
                        FB.ref(`${wkKey(user.week)}/${pk}`).set(pd);
                        if(pk===user.pk)setSubmitted(false);
                      }}>Unlock</button>
                    )}
                  </div>
                ))}
                {gEntries.length===0&&<div style={{fontSize:12,color:"#7a9a7a"}}>No players in your group this week.</div>}
              </div>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
